// ==================== SPEECH SYNTHESIS ====================

function speak(text, rate = 1) {
  if (!('speechSynthesis' in window)) {
    showBanner('您的浏览器不支持语音合成功能');
    return;
  }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'es-ES';
  utter.rate = rate;
  utter.pitch = 1;
  // Try to find a Spanish voice
  const voices = window.speechSynthesis.getVoices();
  const esVoice = voices.find(v => v.lang.startsWith('es'));
  if (esVoice) utter.voice = esVoice;
  window.speechSynthesis.speak(utter);
}

// Load voices
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

  let words = [];

    for (const cat of Object.values(vocabData)) words.push(...cat);
  } else {
    words = vocabData[currentVocabCategory] || [];

  // 搜索过滤
  if (searchText) {

      const normalizedEs = w.es.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

  if (words.length === 0) {

    emptyMsg.style.display = 'block';

// 备用翻译API列表（按优先级排列）
const TRANSLATE_APIS = [
  'https://translate.fedilab.app/translate',
  'https://libretranslate.com/translate'
];

async function tryTranslate(input, source, target, apiIndex = 0) {
  if (apiIndex >= TRANSLATE_APIS.length) {
    throw new Error('所有翻译服务均不可用');
  }
  const url = TRANSLATE_APIS[apiIndex];
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: input, source, target, format: 'text' })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.translatedText;
  } catch (e) {
    // 尝试下一个API
    return tryTranslate(input, source, target, apiIndex + 1);
  }
}

function translateText() {
  const input = document.getElementById('translateInput').value.trim();
  const resultDiv = document.getElementById('translateResult');
  if (!input) {
    resultDiv.innerHTML = '<span style="color:var(--text-light)">请输入要翻译的内容</span>';
    return;
  }

  // 检测输入语言
  const hasChinese = /[\u4e00-\u9fff]/.test(input);
  const source = hasChinese ? 'zh' : 'es';
  const target = hasChinese ? 'es' : 'zh';

  resultDiv.innerHTML = '<span style="color:var(--text-light)">翻译中...</span>';

  tryTranslate(input, source, target)
    .then(translated => {
      resultDiv.innerHTML = `
        <div style="margin-bottom:6px;color:var(--text-light);font-size:0.8rem;">${hasChinese ? '中文 → 西班牙语' : 'Español → 中文'}</div>
        <div style="font-size:1.1rem;font-weight:500;">${translated}</div>
        <button class="sentence-btn" style="margin-top:8px;" onclick="speak('${translated.replace(/'/g, "\\'")}')">🔊 听发音</button>
      `;
    })
    .catch(() => {
      resultDiv.innerHTML = '<span style="color:var(--primary)">翻译服务暂时不可用，请稍后重试</span>';
    });
}

let currentRpScenario = 0;
let currentRpDialogue = 0;
let rpStep = 0;
let rpScore = 0;

function loadRpDialogue() {
  currentRpDialogue = parseInt(document.getElementById('rpDialogueSelect').value);
  rpStep = 0;
  rpScore = 0;
  renderRpChat();
}

function renderRpChat() {
  const container = document.getElementById('rpChatContainer');
  const dialogue = scenarios[currentRpScenario].dialogues[currentRpDialogue];
  let html = '';

  // Show dialogue lines up to current step
  for (let i = 0; i < Math.min(rpStep, dialogue.lines.length); i++) {
    const line = dialogue.lines[i];
    const isRight = line.speaker === 'A';
    html += `
      <div class="chat-bubble ${isRight ? 'right' : 'left'}">
        <div class="chat-avatar">${line.speaker}</div>
        <div class="chat-content">
          <div class="chat-text">${line.es}</div>
          <div class="chat-cn">${line.cn}</div>
          <div class="chat-actions">
            <button class="chat-action-btn" onclick="speak('${line.es.replace(/'/g, "\\'")}')">&#128266; 正常</button>
            <button class="chat-action-btn" onclick="speak('${line.es.replace(/'/g, "\\'")}', 0.6)">&#128017; 慢速</button>
          </div>
        </div>
      </div>`;
  }

  // Show choices if not finished
  if (rpStep < dialogue.lines.length) {
    const currentLine = dialogue.lines[rpStep];
    if (currentLine.speaker === 'B') {
      // Show the B line as NPC, then choices for A's next line
      if (rpStep < dialogue.lines.length) {
        html += `
          <div class="chat-bubble left">
            <div class="chat-avatar">B</div>
            <div class="chat-content">
              <div class="chat-text">${currentLine.es}</div>
              <div class="chat-cn">${currentLine.cn}</div>
              <div class="chat-actions">
                <button class="chat-action-btn" onclick="speak('${currentLine.es.replace(/'/g, "\\'")}')">&#128266; 正常</button>
                <button class="chat-action-btn" onclick="speak('${currentLine.es.replace(/'/g, "\\'")}', 0.6)">&#128017; 慢速</button>
              </div>
            </div>
          </div>`;
      }
      // Find the next A line for choices
      const nextAIndex = dialogue.lines.findIndex((l, idx) => idx > rpStep && l.speaker === 'A');
      if (nextAIndex >= 0) {
        const correctLine = dialogue.lines[nextAIndex];
        // Generate wrong options from other dialogues
        const wrongOptions = generateWrongOptions(correctLine, dialogue, nextAIndex);
        const allOptions = shuffleArray([correctLine, ...wrongOptions]).slice(0, 3);
        html += `
          <div class="rp-choices">
            <p>选择你的回复：</p>
            ${allOptions.map((opt, oi) => `
              <button class="rp-choice-btn" onclick="selectRpChoice(this, ${oi}, ${nextAIndex}, '${correctLine.es.replace(/'/g, "\\'")}')">
                ${opt.es}<br><small style="color:var(--text-light)">${opt.cn}</small>
              </button>
            `).join('')}
          </div>`;
      }
    } else {
      // A's turn - auto show as user
      html += `
        <div class="rp-choices">
          <p>你的回合：</p>
          <button class="rp-choice-btn" onclick="advanceRp()">
            ${currentLine.es}<br><small style="color:var(--text-light)">${currentLine.cn}</small>
          </button>
        </div>`;
    }
  } else {
    // Finished
    html += `
      <div style="text-align:center;padding:20px;color:var(--accent-green);font-weight:600;">
        对话完成！得分：${rpScore}/${dialogue.lines.filter(l => l.speaker === 'A').length}
      </div>
      <div style="text-align:center;">
        <button class="practice-next" onclick="loadRpDialogue()">重新开始</button>
      </div>`;
  }

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function selectRpChoice(btn, optionIndex, correctIndex, correctEs) {
  const dialogue = scenarios[currentRpScenario].dialogues[currentRpDialogue];
  const correctLine = dialogue.lines[correctIndex];
  const btns = btn.parentElement.querySelectorAll('.rp-choice-btn');

  // Check if correct
  const selectedEs = btn.querySelector('small').previousSibling.textContent.trim();
  // Use a simpler check
  const btnText = btn.innerHTML.split('<br>')[0].trim();
  const isCorrect = btnText === correctLine.es;

  btns.forEach(b => {
    const bText = b.innerHTML.split('<br>')[0].trim();
    if (bText === correctLine.es) b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
    b.disabled = true;
  });

  if (isCorrect) rpScore++;

  rpStep = correctIndex + 1;
  setTimeout(() => renderRpChat(), 1000);
}

function advanceRp() {
  rpStep++;
  renderRpChat();
}

function generateWrongOptions(correctLine, dialogue, correctIndex) {
  const wrongs = [];
  // Collect lines from other dialogues
  for (const s of scenarios) {
    for (const d of s.dialogues) {
      for (const l of d.lines) {
        if (l.speaker === 'A' && l.es !== correctLine.es && wrongs.length < 3) {
          wrongs.push(l);
        }
      }
    }
  }
  return wrongs.slice(0, 2);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

      <div class="practice-question">中文提示：<strong>${practice.cn}</strong><br>请根据原句改写为西班牙语：</div>
      <input class="practice-input" id="practice-input-${di}-${li}" type="text" placeholder="输入西班牙语..." onkeydown="if(event.key==='Enter')checkPractice(${di},${li},'${practice.answer.replace(/'/g, "\\'")}')">
      <button class="practice-next" style="margin-top:8px;" onclick="checkPractice(${di},${li},'${practice.answer.replace(/'/g, "\\'")}')">检查答案</button>
      <div class="practice-feedback" id="practice-fb-${di}-${li}"></div>
    </div>`;
}

function togglePractice(di, li) {
  const panel = document.getElementById(`practice-${di}-${li}`);
  if (panel) panel.classList.toggle('show');
}

function checkPractice(di, li, answer) {
  const input = document.getElementById(`practice-input-${di}-${li}`);
  const fb = document.getElementById(`practice-fb-${di}-${li}`);
  const userAnswer = input.value.trim().toLowerCase();
  const correct = userAnswer === answer.toLowerCase();

  fb.className = 'practice-feedback show ' + (correct ? 'correct' : 'wrong');
  fb.textContent = correct ? '✅ 正确！' : `❌ 不对哦，正确答案是：${answer}`;
  if (correct) showBanner('回答正确！');
}

function checkPracticeChoice(di, li, selectedIndex, correctEs) {
  const panel = document.getElementById(`practice-${di}-${li}`);
  const options = panel.querySelectorAll('.practice-option');
  const fb = document.getElementById(`practice-fb-${di}-${li}`);

  options.forEach((opt, i) => {
    const optText = opt.textContent.trim();
    if (optText === correctEs) opt.classList.add('correct');
    else if (i === selectedIndex) opt.classList.add('wrong');
    opt.disabled = true;
  });

  const selectedText = options[selectedIndex].textContent.trim();
  const isCorrect = selectedText === correctEs;
  fb.className = 'practice-feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.textContent = isCorrect ? '✅ 正确！' : `❌ 不对哦，正确答案是：${correctEs}`;
  if (isCorrect) showBanner('回答正确！');
}

function findSentenceKey(di, li) {
  const scenario = scenarios.find(s => s.id === currentScenarioId);
  if (!scenario) return '';
  const line = scenario.dialogues[di].lines[li];
  let key = line.es;
  // Try different formats
  if (grammarData[key]) return key;
  if (grammarData[key.replace(/\.\s*$/, '.')]) return key.replace(/\.\s*$/, '.');
  // Search all keys
  for (const k of Object.keys(grammarData)) {
    if (line.es.includes(k.replace(/[?!.]/g, '').trim().substring(0, 10))) return k;
  }
  return key;
}

// ==================== BANNER ====================

function showBanner(msg) {
  const banner = document.getElementById('scoreBanner');
  banner.textContent = msg;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 2000);
}

// ==================== INIT ====================

function init() {
  renderScenarioGrid();
  renderAlphabet();
  renderNumbers();
  renderVocabFilter();
  renderVocabGrid();
  renderRpScenarioSelect();
  renderRpDialogueSelect();
  loadRpDialogue();
}

document.addEventListener('DOMContentLoaded', init);
</script>
